             const markerLib = await google.maps.importLibrary("marker");
             AdvancedMarkerElement = markerLib.AdvancedMarkerElement;
        } catch (e) {
            console.warn("Could not load AdvancedMarkerElement", e);
        }
    }

    // Center on DC
    const center = { lat: 38.9072, lng: -77.0369 };

    map = new Map(document.getElementById("map-3d"), {
      center: center,
      zoom: 16,
      mapId: mapId, // Use env var or empty
      heading: 0,
      tilt: mapId ? 45 : 0, // Tilt only if 3D
    });

    // Populate Navigation Bar
    const navContainer = document.getElementById('venue-nav');
    
    venues.forEach(v => {
        // Create Chip
        const chip = document.createElement('button');
        chip.style.cssText = `
            flex: 0 0 auto;
            padding: 2px 6px;
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.1s;
            text-align: center;
            white-space: nowrap; 
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        `;
        chip.innerText = v.name;
        chip.title = v.name;

        // Click Handler -> Fly To Venue
        chip.addEventListener('click', () => {
            document.querySelectorAll('#venue-nav button').forEach(b => {
                b.style.background = '#222';
                b.style.borderColor = '#444';
                b.style.color = '#ccc';
            });
            chip.style.background = '#e53935';
            chip.style.borderColor = '#e53935';
            chip.style.color = '#fff';

            flyToVenue(v);
        });

        // Create Marker (Advanced or Legacy)
        let marker;
        if (AdvancedMarkerElement) {
             let content = null;
             if(v.logoUrl && v.logoUrl !== 'null') {
                  const img = document.createElement('img');
                  img.src = v.logoUrl;
                  img.style.width = '32px';
                  img.style.height = '32px';
                  img.style.borderRadius = '50%';
                  img.style.border = '2px solid white';
                  content = img;
             }
             marker = new AdvancedMarkerElement({
                 map,
                 position: { lat: v.lat, lng: v.lng },
                 title: v.name,
                 content: content
             });
        } else {
             // Fallback to Legacy for 2D
             marker = new google.maps.Marker({
                 map,
                 position: { lat: v.lat, lng: v.lng },
                 title: v.name,
             });
        }

        // Click marker -> also fly
        marker.addListener('click', () => {
             chip.click();
             chip.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
    });
  }

  function flyToVenue(v) {
      if (!map) return;
      
      console.log("Flying to:", v.name);
      
      map.moveCamera({
          center: { lat: v.lat, lng: v.lng },
          zoom: 19, // Adjusted for "Real Life" view
          heading: 0, // Reset heading or keep current? Let's verify facing logic later.
          tilt: 67.5 // Max tilt for street-level feel
      });

      // Optional: Auto-rotate slowly around the venue once arrived? 
      // For now, static arrival is safer for UX.
  }

  initMap();
</script>

  <script>
    // Global Image Modal Logic
    window.openImageModal = function(src) {
        var modal = document.getElementById("imageModal");
        var modalImg = document.getElementById("img01");
        if(modal && modalImg) {
            modal.style.display = "flex";
            modalImg.src = src;
            document.body.style.overflow = "hidden"; 
        }
    }
    
    window.closeImageModal = function() {
        var modal = document.getElementById("imageModal");
        if(modal) {
            modal.style.display = "none";
            document.body.style.overflow = "auto"; 
        }
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape") {
            window.closeImageModal();
        }
    });
  </script>
